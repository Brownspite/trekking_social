
<style>
#erd { padding: 0.5rem 0; }
#erd svg { width: 100%; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#1a1a18' : '#f5f4ee',
    primaryBorderColor: dark ? '#3d3d3a' : '#b4b2a9',
    primaryTextColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});

const diagram = `erDiagram
  USERS {
    uuid id PK
    string full_name
    string email
    string password_hash
    string avatar_url
    enum role
    timestamp created_at
  }

  CATEGORIES {
    uuid id PK
    string name
    string slug
    string color
  }

  EVENTS {
    uuid id PK
    uuid organizer_id FK
    uuid category_id FK
    string title
    text description
    string location
    string cover_image_url
    timestamp starts_at
    int max_participants
    decimal price
    string currency
    enum difficulty
    enum status
    timestamp created_at
  }

  REGISTRATIONS {
    uuid id PK
    uuid user_id FK
    uuid event_id FK
    enum status
    timestamp registered_at
    timestamp cancelled_at
  }

  PAYMENTS {
    uuid id PK
    uuid registration_id FK
    string stripe_payment_intent_id
    string stripe_customer_id
    decimal amount
    string currency
    enum status
    timestamp paid_at
    timestamp refunded_at
  }

  NOTIFICATIONS {
    uuid id PK
    uuid user_id FK
    uuid event_id FK
    enum type
    string title
    text body
    boolean is_read
    timestamp created_at
  }

  USERS ||--o{ EVENTS : "organizes"
  USERS ||--o{ REGISTRATIONS : "makes"
  USERS ||--o{ NOTIFICATIONS : "receives"
  CATEGORIES ||--o{ EVENTS : "groups"
  EVENTS ||--o{ REGISTRATIONS : "has"
  EVENTS ||--o{ NOTIFICATIONS : "generates"
  REGISTRATIONS ||--o| PAYMENTS : "paid via"
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
